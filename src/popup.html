<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>YTM Scrobbler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:280px;padding:20px;font:13px/1.4 system-ui,-apple-system,sans-serif;color:#e0e0e0;background:#0d0d0d;scrollbar-color:#d40000 #1a1a1a}
h1{font-size:14px;font-weight:600;letter-spacing:-.02em;color:#e0e0e0;border-bottom:1px solid #1a1a1a;padding-bottom:8px}
#header-ytm{color:#d40000}
#auth,#player{transition:opacity .15s}
.status{font-size:12px;color:#666;margin:8px 0 12px;line-height:1.5}
button{width:100%;padding:9px 12px;border:0;border-radius:8px;cursor:pointer;font:inherit;font-size:12px;font-weight:500;transition:background .15s}
.btn-primary{background:#d40000;color:#fff}
.btn-primary:hover{background:#b30000}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-secondary{background:#1a1a1a;color:#888;margin-top:10px}
.btn-secondary:hover{background:#222;color:#e0e0e0}
.track{margin:12px 0}
.title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.artist{font-size:11px;color:#666;margin-top:2px}
#auth-msg{font-size:11px;color:#d40000;margin-top:8px}
.setting{display:flex;align-items:center;gap:6px;margin:10px 0;font-size:11px;color:#666}
.setting input{flex:1;accent-color:#d40000;height:4px}
.setting span{min-width:28px;text-align:right}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:4px}
.dot.red{background:#d40000;box-shadow:0 0 6px rgba(212,0,0,.5)}
.dot.grey{background:#444}
.hidden{display:none}
</style>
</head>
<body>
<h1><span class="dot red" id="status-dot"></span><span id="header-ytm">YTM</span><span id="header-text"> Scrobbler</span></h1>
<div id="auth">
  <p class="status">Authorize with Last.fm to start scrobbling</p>
  <button id="btn-auth" class="btn-primary">Authorize with Last.fm</button>
  <p id="auth-msg" class="hidden"></p>
</div>
<div id="player" class="hidden">
  <div class="track">
    <div class="title" id="track-title">—</div>
    <div class="artist" id="track-artist">—</div>
  </div>
  <div class="setting"><label>Scrobble at</label> <input type="range" id="scrobble-at" min="0.1" max="1" step="0.05" value="0.5"> <span id="scrobble-pct">50%</span></div>
  <button id="btn-disconnect" class="btn-secondary">Disconnect</button>
</div>
<script src="popup.js"></script>
</body>
</html>
